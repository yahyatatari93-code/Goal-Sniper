<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>عرّاف الدوري - نظام التوقعات الذكي</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Cairo', 'sans-serif'] },
                    colors: {
                        deep: '#0a0e17', card: '#131b2e', primary: '#3b82f6',
                        crimson: '#8b0000', gold: '#f59e0b', accent: '#10b981'
                    }
                }
            }
        }
    </script>
    
    <style>
        body {
            background-color: #0a0e17; color: #f8fafc;
            background-image: radial-gradient(circle at 10% 20%, rgba(59, 130, 246, 0.08) 0%, transparent 40%),
                              radial-gradient(circle at 90% 95%, rgba(139, 0, 0, 0.3) 0%, transparent 50%);
            background-attachment: fixed;
            -webkit-tap-highlight-color: transparent;
        }
        .glass {
            background: rgba(19, 27, 46, 0.75); backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 16px;
        }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .score-input {
            width: 48px; height: 48px; text-align: center; font-size: 1.2rem; font-weight: bold;
            background: #0a0e17; border: 1px solid rgba(255, 255, 255, 0.15); color: white;
            border-radius: 12px; outline: none; transition: all 0.3s;
        }
        .score-input:focus { border-color: #3b82f6; box-shadow: 0 0 12px rgba(59, 130, 246, 0.4); }
        .bottom-nav-pb { padding-bottom: calc(95px + env(safe-area-inset-bottom)); }
        
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-up { animation: fadeUp 0.35s ease forwards; }
    </style>
</head>
<body class="min-h-screen flex flex-col bottom-nav-pb">

    <div id="app" class="flex-1 flex flex-col">
        <div class="flex items-center justify-center min-h-screen text-slate-400">جاري تحميل عرّاف الدوري الإنجليزي...</div>
    </div>

    <!-- Modal Container -->
    <div id="modal-container"></div>
    
    <!-- Custom Dialog Container -->
    <div id="dialog-container"></div>

    <script>
        const TEAMS = [
            { code: 'ARS', name: 'آرسنال' }, { code: 'MCI', name: 'مانشستر سيتي' },
            { code: 'LIV', name: 'ليفربول' }, { code: 'MUN', name: 'مانشستر يونايتد' },
            { code: 'CHE', name: 'تشيلسي' }, { code: 'TOT', name: 'توتنهام' },
            { code: 'NEW', name: 'نيوكاسل يونايتد' }, { code: 'AVL', name: 'أستون فيلا' },
            { code: 'BHA', name: 'برايتون' }, { code: 'COV', name: 'كوفنتري سيتي' },
            { code: 'HUL', name: 'هال سيتي' }, { code: 'NFO', name: 'نوتينغهام فورست' },
            { code: 'LEE', name: 'ليدز يونايتد' }, { code: 'IPS', name: 'إيبسويتش تاون' },
            { code: 'SUN', name: 'سندرلاند' }, { code: 'CRY', name: 'كريستال بالاس' },
            { code: 'BRE', name: 'برينتفورد' }, { code: 'FUL', name: 'فولهام' },
            { code: 'BOU', name: 'بورنموث' }, { code: 'EVE', name: 'إيفرتون' }
        ];
        const BIG_TEAMS = ['ARS', 'MCI', 'LIV', 'MUN', 'CHE', 'TOT'];

        const getTeamName = (code) => TEAMS.find(t => t.code === code)?.name || code;
        
        const getMatchType = (h, a) => {
            const hB = BIG_TEAMS.includes(h), aB = BIG_TEAMS.includes(a);
            if (hB && aB) return { label: '👑 قمة الكبار', color: 'text-yellow-400' };
            if (!hB && !aB) return { label: '⚽ مباراة متكافئة', color: 'text-gray-400' };
            return { label: '🌟 الكبار ضد الطموحين', color: 'text-blue-400' };
        };

        const INITIAL_MATCHES = [
            { id: 'm1_1', gw: 1, home: 'ARS', away: 'COV', date: '2026/08/21', time: '10:00 م', actualH: null, actualA: null },
            { id: 'm1_2', gw: 1, home: 'HUL', away: 'MUN', date: '2026/08/22', time: '2:30 م', actualH: null, actualA: null },
            { id: 'm1_3', gw: 1, home: 'NFO', away: 'LEE', date: '2026/08/22', time: '5:00 م', actualH: null, actualA: null },
            { id: 'm1_4', gw: 1, home: 'IPS', away: 'SUN', date: '2026/08/22', time: '5:00 م', actualH: null, actualA: null },
            { id: 'm1_5', gw: 1, home: 'EVE', away: 'CRY', date: '2026/08/22', time: '5:00 م', actualH: null, actualA: null },
            { id: 'm1_6', gw: 1, home: 'BRE', away: 'TOT', date: '2026/08/22', time: '7:30 م', actualH: null, actualA: null },
            { id: 'm1_7', gw: 1, home: 'MCI', away: 'BOU', date: '2026/08/23', time: '4:00 م', actualH: null, actualA: null },
            { id: 'm1_8', gw: 1, home: 'BHA', away: 'AVL', date: '2026/08/23', time: '4:00 م', actualH: null, actualA: null },
            { id: 'm1_9', gw: 1, home: 'NEW', away: 'LIV', date: '2026/08/23', time: '6:30 م', actualH: null, actualA: null },
            { id: 'm1_10', gw: 1, home: 'FUL', away: 'CHE', date: '2026/08/24', time: '10:00 م', actualH: null, actualA: null },
            
            { id: 'm2_1', gw: 2, home: 'CRY', away: 'MCI', date: '2026/08/28', time: '10:00 م', actualH: null, actualA: null },
            { id: 'm2_2', gw: 2, home: 'LIV', away: 'NFO', date: '2026/08/29', time: '2:30 م', actualH: null, actualA: null },
            { id: 'm2_3', gw: 2, home: 'COV', away: 'HUL', date: '2026/08/29', time: '5:00 م', actualH: null, actualA: null },
            { id: 'm2_4', gw: 2, home: 'BOU', away: 'EVE', date: '2026/08/29', time: '5:00 م', actualH: null, actualA: null },
            { id: 'm2_5', gw: 2, home: 'TOT', away: 'NEW', date: '2026/08/29', time: '7:30 م', actualH: null, actualA: null },
            { id: 'm2_6', gw: 2, home: 'SUN', away: 'FUL', date: '2026/08/30', time: '4:00 م', actualH: null, actualA: null },
            { id: 'm2_7', gw: 2, home: 'LEE', away: 'BRE', date: '2026/08/30', time: '4:00 م', actualH: null, actualA: null },
            { id: 'm2_8', gw: 2, home: 'CHE', away: 'BHA', date: '2026/08/30', time: '4:00 م', actualH: null, actualA: null },
            { id: 'm2_9', gw: 2, home: 'MUN', away: 'IPS', date: '2026/08/30', time: '6:30 م', actualH: null, actualA: null },
            { id: 'm2_10', gw: 2, home: 'AVL', away: 'ARS', date: '2026/08/31', time: '10:00 م', actualH: null, actualA: null },

            ...Array.from({ length: 36 }, (_, i) => {
                const gw = i + 3;
                return TEAMS.slice(0, 10).map((t, idx) => ({
                    id: `m${gw}_${idx+1}`,
                    gw: gw,
                    home: t.code,
                    away: TEAMS[(idx + 3 + i) % TEAMS.length].code,
                    date: `2026/0${Math.floor(gw/5)+9}/${(idx*2 + 3)%28 + 1}`,
                    time: '5:00 م',
                    actualH: null,
                    actualA: null
                }));
            }).flat()
        ];

        let users = [], currentUser = null, matches = INITIAL_MATCHES, predictions = {}, miniLeagues = [];
        try {
            users = JSON.parse(localStorage.getItem('oracle_users_v8') || 'null') || [];
            currentUser = JSON.parse(localStorage.getItem('oracle_current_user_v8') || 'null');
            matches = JSON.parse(localStorage.getItem('oracle_matches_v8') || 'null') || INITIAL_MATCHES;
            predictions = JSON.parse(localStorage.getItem('oracle_predictions_v8') || 'null') || {};
            miniLeagues = JSON.parse(localStorage.getItem('oracle_minileagues_v8') || 'null') || [];
        } catch (e) {
            console.error('Storage error:', e);
            users = [];
            currentUser = null;
            matches = INITIAL_MATCHES;
            predictions = {};
            miniLeagues = [];
        }

        let currentTab = 'home';
        let authMode = 'login';
        let activeMatchModal = null;

        function saveState() {
            try {
                localStorage.setItem('oracle_users_v8', JSON.stringify(users));
                localStorage.setItem('oracle_current_user_v8', JSON.stringify(currentUser));
                localStorage.setItem('oracle_matches_v8', JSON.stringify(matches));
                localStorage.setItem('oracle_predictions_v8', JSON.stringify(predictions));
                localStorage.setItem('oracle_minileagues_v8', JSON.stringify(miniLeagues));
            } catch (e) {
                console.error('Save state error:', e);
            }
        }

        const calcPoints = (homeCode, awayCode, predH, predA, actualH = null, actualA = null, isCaptain = false, isTripleCaptain = false, isShield = false) => {
            if (predH === '' || predA === '' || predH === null || predA === null) return 0;
            const ph = Number(predH), pa = Number(predA);
            const homeIsBig = BIG_TEAMS.includes(homeCode);
            const awayIsBig = BIG_TEAMS.includes(awayCode);

            let ah = actualH !== null ? Number(actualH) : ph;
            let aa = actualA !== null ? Number(actualA) : pa;

            const isExact = (ph === ah && pa === aa);
            const isOutcomeCorrect = (ph > pa && ah > aa) || (ph < pa && ah < aa) || (ph === pa && ah === aa);
            const isDraw = (ah === aa);
            const totalGoals = ah + aa;

            let pts = 0;

            if (isOutcomeCorrect || isExact) {
                if (!homeIsBig && !awayIsBig) {
                    if (isExact) pts = (totalGoals >= 5 || (ah === 0 && aa === 0)) ? 4 : 3;
                    else if (isOutcomeCorrect) pts = 1;
                } else if (homeIsBig && awayIsBig) {
                    if (isDraw) pts = isExact ? 3 : 2;
                    else pts = isExact ? 5 : 3;
                } else {
                    const bigWon = (homeIsBig && ah > aa) || (awayIsBig && aa > ah);
                    const bigLost = (homeIsBig && ah < aa) || (awayIsBig && aa < ah);
                    if (isDraw) pts = isExact ? 3 : 2;
                    else if (bigWon) pts = isExact ? 2 : 1;
                    else if (bigLost) pts = isExact ? 6 : 4;
                }
            }

            // تطبيق بطاقات القوة
            if (pts === 0 && isShield) return 1; // التأمين
            if (isTripleCaptain) return pts * 3; // الجوكر الخطير
            if (isCaptain) return pts * 2; // الكابتن العادي
            
            return pts;
        };

        function getGlobalStandings() {
            const statsMap = {};
            users.forEach(u => { 
                statsMap[u.username] = { 
                    username: u.username, totalPts: 0, predictedCount: 0,
                    correctOutcomes: 0, playedMatches: 0,
                    teamPoints: {}, exactsPerGw: {}, gwPoints: {},
                    badges: { sniper: false, giantSlayer: false, motw: false }
                }; 
            });

            matches.forEach(m => {
                const isPlayed = m.actualH !== null && m.actualA !== null;
                
                users.forEach(u => {
                    const p = (predictions[u.username] || {})[m.id];
                    const userStats = statsMap[u.username];
                    
                    if (p && p.home !== '' && p.away !== '') {
                        userStats.predictedCount++;
                        
                        if (isPlayed) {
                            userStats.playedMatches++;
                            const pts = calcPoints(m.home, m.away, p.home, p.away, m.actualH, m.actualA, p.isCaptain, p.isTripleCaptain, p.isShield);
                            userStats.totalPts += pts;
                            
                            // حساب دقة التوقع (Hit Rate)
                            const isOutcomeCorrect = (p.home > p.away && m.actualH > m.actualA) || (p.home < p.away && m.actualH < m.actualA) || (p.home === p.away && m.actualH === m.actualA);
                            if (isOutcomeCorrect) userStats.correctOutcomes++;

                            // نقاط كل فريق (لإيجاد الفريق المفضل)
                            userStats.teamPoints[m.home] = (userStats.teamPoints[m.home] || 0) + pts;
                            userStats.teamPoints[m.away] = (userStats.teamPoints[m.away] || 0) + pts;

                            // إحصائيات الجولات
                            userStats.gwPoints[m.gw] = (userStats.gwPoints[m.gw] || 0) + pts;
                            
                            // وسام القناص (3 نتائج رقمية في جولة)
                            if (Number(p.home) === m.actualH && Number(p.away) === m.actualA) {
                                userStats.exactsPerGw[m.gw] = (userStats.exactsPerGw[m.gw] || 0) + 1;
                                if (userStats.exactsPerGw[m.gw] >= 3) userStats.badges.sniper = true;
                            }

                            // وسام قاهر الكبار
                            const homeIsBig = BIG_TEAMS.includes(m.home), awayIsBig = BIG_TEAMS.includes(m.away);
                            const bigLost = (homeIsBig && m.actualH < m.actualA) || (awayIsBig && m.actualA < m.actualH);
                            if (bigLost && isOutcomeCorrect) userStats.badges.giantSlayer = true;
                        }
                    }
                });
            });

            // تحديد عراف الأسبوع (وسام الأسبوع)
            const activeGw = getCurrentActiveGw();
            const prevGw = activeGw > 1 ? activeGw - 1 : 1;
            let highestGwPts = -1;
            let motwUser = null;
            
            Object.values(statsMap).forEach(userStats => {
                const pts = userStats.gwPoints[prevGw] || 0;
                if (pts > highestGwPts && pts > 0) {
                    highestGwPts = pts;
                    motwUser = userStats.username;
                }
            });
            if (motwUser) statsMap[motwUser].badges.motw = true;

            // حسابات نهائية (معدل الدقة والفريق المفضل)
            Object.values(statsMap).forEach(userStats => {
                userStats.hitRate = userStats.playedMatches > 0 ? Math.round((userStats.correctOutcomes / userStats.playedMatches) * 100) : 0;
                let bestTeam = '-', maxTeamPts = -1;
                for (const [team, pts] of Object.entries(userStats.teamPoints)) {
                    if (pts > maxTeamPts) { maxTeamPts = pts; bestTeam = getTeamName(team); }
                }
                userStats.favTeam = maxTeamPts > 0 ? bestTeam : '-';
            });

            return Object.values(statsMap).sort((a, b) => b.totalPts - a.totalPts);
        }

        function isMatchLocked(match) {
            try {
                // إذا تم تسجيل نتيجة فعلية، فالمباراة مقفلة حكماً
                if (match.actualH !== null && match.actualA !== null) return true;
                
                // حساب الوقت المتبقي
                const [year, month, day] = match.date.split('/');
                let [timeStr, period] = match.time.split(' ');
                let [hours, minutes] = timeStr.split(':');
                hours = parseInt(hours, 10);
                if (period === 'م' && hours !== 12) hours += 12;
                if (period === 'ص' && hours === 12) hours = 0;
                
                const matchDate = new Date(year, month - 1, day, hours, minutes);
                const now = new Date();
                const diffMs = matchDate - now;
                
                // قفل التوقع إذا كان الوقت المتبقي ساعة (60 دقيقة) أو أقل
                return diffMs <= 60 * 60 * 1000;
            } catch(e) {
                return false;
            }
        }

        function getCurrentActiveGw() {
            for (let gw = 1; gw <= 38; gw++) {
                const gwMatches = matches.filter(m => m.gw === gw);
                if (gwMatches.length === 0) continue;
                if (!gwMatches.every(m => m.actualH !== null && m.actualA !== null)) return gw;
            }
            return 1;
        }

        function renderHomeTab() {
            const activeGw = getCurrentActiveGw();
            const prevGw = activeGw > 1 ? activeGw - 1 : null;
            const gwMatches = matches.filter(m => m.gw === activeGw);
            const userPreds = predictions[currentUser.username] || {};
            
            const standings = getGlobalStandings();
            const myStats = standings.find(u => u.username === currentUser.username);
            const myRank = standings.findIndex(u => u.username === currentUser.username) + 1 || '-';
            
            // جلب بطل الجولة السابقة
            const motw = prevGw ? standings.find(u => u.badges.motw) : null;

            return `
                <div class="space-y-6">
                    ${motw ? `
                        <div class="glass p-4 rounded-3xl bg-gradient-to-r from-amber-500/20 to-amber-700/20 border border-amber-500/30 flex items-center justify-between shadow-[0_0_15px_rgba(245,158,11,0.2)]">
                            <div class="flex items-center gap-3">
                                <div class="w-12 h-12 bg-amber-500 rounded-full flex items-center justify-center text-xl shadow-lg shadow-amber-500/40">👑</div>
                                <div>
                                    <h3 class="text-xs font-bold text-amber-500">عراف الأسبوع (الجولة ${prevGw})</h3>
                                    <span class="text-base font-black text-white">${motw.username}</span>
                                </div>
                            </div>
                            <div class="text-center">
                                <span class="block text-2xl font-black text-amber-400">${motw.gwPoints[prevGw]}</span>
                                <span class="text-[10px] text-slate-300">نقطة</span>
                            </div>
                        </div>
                    ` : ''}

                    <div class="glass p-5 md:p-6 rounded-3xl relative overflow-hidden border border-blue-500/20 shadow-xl bg-gradient-to-br from-indigo-950/60 via-[#131b2e] to-blue-950/50">
                        <div class="flex justify-between items-start mb-6">
                            <div>
                                <span class="text-xs font-bold text-blue-400 bg-blue-600/20 px-3 py-1 rounded-full border border-blue-500/30">بطاقة العرّاف الشخصية</span>
                                <h2 class="text-xl md:text-2xl font-black mt-2 text-white flex items-center gap-2">
                                    ${currentUser.username}
                                    ${myStats.badges.motw ? '<span title="عراف الأسبوع" class="text-amber-400 text-lg"><i class="fa-solid fa-fire"></i></span>' : ''}
                                    ${myStats.badges.sniper ? '<span title="القناص" class="text-emerald-400 text-lg"><i class="fa-solid fa-crosshairs"></i></span>' : ''}
                                    ${myStats.badges.giantSlayer ? '<span title="قاهر الكبار" class="text-rose-400 text-lg"><i class="fa-solid fa-shield-halved"></i></span>' : ''}
                                </h2>
                            </div>
                            <div class="text-left">
                                <span class="text-[10px] text-slate-400 block">الترتيب العام</span>
                                <span class="text-lg md:text-xl font-black text-amber-400">#${myRank}</span>
                            </div>
                        </div>

                        <div class="grid grid-cols-2 md:grid-cols-4 gap-3 text-center mb-3">
                            <div class="bg-slate-900/60 p-3 rounded-2xl border border-white/5">
                                <span class="text-[10px] text-slate-400 block mb-1">المجموع الكلي</span>
                                <span class="text-lg font-black text-amber-400">${myStats.totalPts}</span>
                            </div>
                            <div class="bg-slate-900/60 p-3 rounded-2xl border border-white/5">
                                <span class="text-[10px] text-slate-400 block mb-1">معدل الدقة</span>
                                <span class="text-lg font-black text-emerald-400">${myStats.hitRate}%</span>
                            </div>
                            <div class="bg-slate-900/60 p-3 rounded-2xl border border-white/5 col-span-2">
                                <span class="text-[10px] text-slate-400 block mb-1">الفريق المفضل للتوقع (أكثر نقاط)</span>
                                <span class="text-base font-black text-blue-300 truncate block">${myStats.favTeam}</span>
                            </div>
                        </div>
                    </div>

                    <div>
                        <div class="flex justify-between items-center mb-4">
                            <h3 class="font-bold text-base md:text-lg flex items-center gap-2">
                                <i class="fa-solid fa-fire text-amber-400"></i> مباريات الجولة الحالية (${activeGw})
                            </h3>
                            <button onclick="switchTab('matches')" class="text-xs text-blue-400 hover:underline font-semibold">
                                عرض كل الجولات <i class="fa-solid fa-arrow-left mr-1"></i>
                            </button>
                        </div>

                        <div class="space-y-3">
                            ${gwMatches.map(match => {
                                const pred = userPreds[match.id] || { home: '', away: '', isCaptain: false, isTripleCaptain: false, isShield: false };
                                const matchType = getMatchType(match.home, match.away);
                                const isPredicted = pred.home !== '' && pred.away !== '' && pred.home !== null && pred.away !== null;
                                const isLocked = isMatchLocked(match);
                                
                                let badgeHtml = '';
                                if (pred.isTripleCaptain) badgeHtml = `<div class="absolute top-3 left-3 bg-fuchsia-600 text-white px-2 py-0.5 rounded-lg flex items-center gap-1 font-black text-[10px] shadow-lg shadow-fuchsia-600/50"><i class="fa-solid fa-bolt"></i> الجوكر x3</div>`;
                                else if (pred.isShield) badgeHtml = `<div class="absolute top-3 left-3 bg-sky-500 text-white w-6 h-6 rounded-full flex items-center justify-center font-black text-[10px] shadow-lg shadow-sky-500/50" title="درع التأمين"><i class="fa-solid fa-shield"></i></div>`;
                                else if (pred.isCaptain) badgeHtml = `<div class="absolute top-3 left-3 bg-amber-500 text-black w-6 h-6 rounded-full flex items-center justify-center font-black text-xs shadow-lg shadow-amber-500/50" title="كابتن الجولة">C</div>`;

                                return `
                                    <div class="glass p-4 rounded-2xl flex flex-col gap-3 shadow-md relative ${isLocked ? 'opacity-80' : ''}">
                                        ${badgeHtml}
                                        <div class="flex justify-between items-center text-xs text-slate-400 border-b border-white/5 pb-2">
                                            <span class="font-bold ${matchType.color}">${matchType.label}</span>
                                            <span class="${isLocked ? 'text-rose-400' : ''}"><i class="far fa-${isLocked ? 'lock' : 'calendar-alt'} ml-1"></i> ${isLocked ? 'مقفلة' : `${match.date} - ${match.time}`}</span>
                                        </div>
                                        <div class="flex items-center justify-between">
                                            <div class="flex-1 text-left font-bold text-sm md:text-base text-slate-200">${getTeamName(match.home)}</div>
                                            <div class="px-3">

                                        <button onclick="clearActual('${m.id}')" class="px-3 py-1.5 bg-slate-700/50 text-slate-300 hover:bg-slate-600 hover:text-white rounded-lg text-xs font-bold transition-all"><i class="fa-solid fa-xmark mr-1"></i> إلغاء</button>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>

                    <!-- قسم إدارة الدوريات المصغرة للإدارة -->
                    <div class="glass p-6 rounded-3xl space-y-4">
                        <h3 class="font-bold text-sm text-slate-200"><i class="fa-solid fa-users-gear text-blue-400"></i> إدارة الدوريات المصغرة</h3>
                        <div class="space-y-3">
                            ${miniLeagues.length === 0 ? '<p class="text-xs text-slate-400 text-center py-4">لا توجد دوريات مصغرة حالياً.</p>' : miniLeagues.map(ml => `
                                <div class="bg-slate-900/60 p-4 rounded-xl border border-white/5 space-y-3">
                                    <div class="flex justify-between items-center border-b border-white/10 pb-2">
                                        <div>
                                            <h4 class="font-bold text-sm text-blue-400">${ml.name}</h4>
                                            <span class="text-[10px] text-slate-400">الكود: ${ml.code} | المنشئ: ${ml.creator}</span>
                                        </div>
                                        <button onclick="adminDeleteLeague('${ml.id}')" class="px-3 py-1.5 bg-rose-600/20 text-rose-400 border border-rose-500/30 rounded-lg text-xs font-bold hover:bg-rose-600 hover:text-white transition-all"><i class="fa-solid fa-trash mr-1"></i> حذف الدوري</button>
                                    </div>
                                    <div class="space-y-2">
                                        <span class="text-xs font-bold text-slate-400 block mb-1">أعضاء الدوري:</span>
                                        ${ml.members.map(member => `
                                            <div class="flex justify-between items-center text-xs bg-slate-950 p-2.5 rounded-lg border border-white/5">
                                                <span class="text-slate-300 font-bold"><i class="fa-solid fa-user text-slate-500 ml-1"></i> ${member}</span>
                                                <button onclick="adminKickMember('${ml.id}', '${member}')" class="text-rose-400 hover:text-rose-300 p-1 transition-all font-bold" title="طرد المستخدم"><i class="fa-solid fa-user-xmark ml-1"></i> طرد</button>
                                            </div>
                                        `).join('')}
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;
        }

        function openModal(matchId) {
            activeMatchModal = matches.find(m => m.id === matchId);
            renderModal();
        }

        function closeModal() {
            activeMatchModal = null;
            renderModal();
        }

        function renderModal() {
            const container = document.getElementById('modal-container');
            if (!activeMatchModal) {
                container.innerHTML = '';
                return;
            }
            const pred = (predictions[currentUser.username] || {})[activeMatchModal.id] || { home: '', away: '', isCaptain: false, isTripleCaptain: false, isShield: false };
            const hVal = pred.home !== undefined ? pred.home : '';
            const aVal = pred.away !== undefined ? pred.away : '';
            
            // تحقق من استهلاك بطاقات القوة في هذا النصف من الموسم
            const isSecondHalf = activeMatchModal.gw >= 19;
            let tcUsedInHalf = false;
            let shieldUsedInHalf = false;
            
            const userPreds = predictions[currentUser.username] || {};
            Object.entries(userPreds).forEach(([mId, p]) => {
                if (mId === activeMatchModal.id) return; // تخطي المباراة الحالية
                const m = matches.find(x => x.id === mId);
                if (m) {
                    const mHalf = m.gw >= 19;
                    if (mHalf === isSecondHalf) {
                        if (p.isTripleCaptain) tcUsedInHalf = true;
                        if (p.isShield) shieldUsedInHalf = true;
                    }
                }
            });

            // تعطيل الخيارات إذا تم استخدامها
            const disableTC = tcUsedInHalf && !pred.isTripleCaptain;
            const disableShield = shieldUsedInHalf && !pred.isShield;

            const pts = calcPoints(activeMatchModal.home, activeMatchModal.away, hVal, aVal, null, null, pred.isCaptain, pred.isTripleCaptain, pred.isShield);

            container.innerHTML = `
                <div class="fixed inset-0 z-50 bg-black/80 backdrop-blur-sm flex items-center justify-center p-4">
                    <div class="glass max-w-sm w-full p-6 rounded-3xl shadow-2xl border border-white/10 space-y-5 animate-fade-up relative">
                        <div class="text-center">
                            <span class="text-[10px] text-blue-400 font-bold bg-blue-600/20 px-3 py-1 rounded-full border border-blue-500/30">نافذة التوقع الذكية</span>
                            <h3 class="text-base font-bold text-white mt-2">${getTeamName(activeMatchModal.home)} ضد ${getTeamName(activeMatchModal.away)}</h3>
                        </div>
                        <div class="flex items-center justify-center gap-4">
                            <div class="text-center">
                                <span class="text-[10px] text-slate-400 block mb-1">${getTeamName(activeMatchModal.home)}</span>
                                <input type="text" inputmode="numeric" id="modal-pred-h" value="${hVal}" oninput="this.value = this.value.replace(/[^0-9]/g, ''); updateModalCalc()" class="score-input" />
                            </div>
                            <span class="text-xl font-bold text-slate-500">:</span>
                            <div class="text-center">
                                <span class="text-[10px] text-slate-400 block mb-1">${getTeamName(activeMatchModal.away)}</span>
                                <input type="text" inputmode="numeric" id="modal-pred-a" value="${aVal}" oninput="this.value = this.value.replace(/[^0-9]/g, ''); updateModalCalc()" class="score-input" />
                            </div>
                        </div>
                        
                        <div class="space-y-2 bg-slate-900/50 p-2 rounded-2xl border border-white/5">
                            <label class="flex items-center gap-3 p-2 rounded-xl cursor-pointer hover:bg-slate-800 transition-all">
                                <input type="radio" name="powerup" value="captain" onchange="updateModalCalc()" ${pred.isCaptain ? 'checked' : ''} class="w-4 h-4 accent-amber-500 bg-slate-950" />
                                <div class="flex-1">
                                    <span class="text-xs font-bold text-amber-400 block">C كابتن عادي (x2)</span>
                                </div>
                            </label>
                            
                            <label class="flex items-center gap-3 p-2 rounded-xl ${disableTC ? 'opacity-50 cursor-not-allowed' : 'cursor-pointer hover:bg-slate-800'} transition-all">
                                <input type="radio" name="powerup" value="triple" onchange="updateModalCalc()" ${pred.isTripleCaptain ? 'checked' : ''} ${disableTC ? 'disabled' : ''} class="w-4 h-4 accent-fuchsia-500 bg-slate-950" />
                                <div class="flex-1">
                                    <span class="text-xs font-bold text-fuchsia-400 block"><i class="fa-solid fa-bolt mr-1"></i> الجوكر الخطير (x3)</span>
                                    <span class="text-[9px] text-slate-400">${disableTC ? 'استُخدمت في هذا النصف' : 'متاحة (مرة بكل نصف موسم)'}</span>
                                </div>
                            </label>

                            <label class="flex items-center gap-3 p-2 rounded-xl ${disableShield ? 'opacity-50 cursor-not-allowed' : 'cursor-pointer hover:bg-slate-800'} transition-all">
                                <input type="radio" name="powerup" value="shield" onchange="updateModalCalc()" ${pred.isShield ? 'checked' : ''} ${disableShield ? 'disabled' : ''} class="w-4 h-4 accent-sky-500 bg-slate-950" />
                                <div class="flex-1">
                                    <span class="text-xs font-bold text-sky-400 block"><i class="fa-solid fa-shield mr-1"></i> درع التأمين</span>
                                    <span class="text-[9px] text-slate-400">${disableShield ? 'استُخدمت في هذا النصف' : 'تحميك من الصفر بـ 1 نقطة'}</span>
                                </div>
                            </label>
                            
                            <label class="flex items-center gap-3 p-2 rounded-xl cursor-pointer hover:bg-slate-800 transition-all border-t border-white/5">
                                <input type="radio" name="powerup" value="none" onchange="updateModalCalc()" ${!pred.isCaptain && !pred.isTripleCaptain && !pred.isShield ? 'checked' : ''} class="w-4 h-4 accent-slate-400 bg-slate-950" />
                                <div class="flex-1"><span class="text-xs font-bold text-slate-300 block">بدون بطاقات</span></div>
                            </label>
                        </div>

                        <div class="bg-slate-900/80 p-3.5 rounded-2xl border border-emerald-500/30 text-center">
                            <span class="text-[10px] text-slate-400 block mb-1">النقاط المحتملة (إذا تحقق التوقع تماماً):</span>
                            <span id="modal-pts-display" class="text-xl font-black text-emerald-400">${pts} نقطة</span>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="saveModalPrediction()" class="flex-1 py-3 bg-blue-600 hover:bg-blue-500 text-white font-bold text-xs rounded-xl shadow-lg shadow-blue-600/30 transition-all">حفظ التوقع</button>
                            <button onclick="closeModal()" class="px-4 py-3 bg-slate-800 hover:bg-slate-700 text-slate-300 font-bold text-xs rounded-xl transition-all">إلغاء</button>
                        </div>
                    </div>
                </div>
            `;
        }

        function updateModalCalc() {
            const h = document.getElementById('modal-pred-h').value;
            const a = document.getElementById('modal-pred-a').value;
            
            const powerup = document.querySelector('input[name="powerup"]:checked')?.value || 'none';
            const isCap = powerup === 'captain';
            const isTC = powerup === 'triple';
            const isShield = powerup === 'shield';

            const pts = calcPoints(activeMatchModal.home, activeMatchModal.away, h, a, null, null, isCap, isTC, isShield);
            document.getElementById('modal-pts-display').innerText = pts + ' نقطة';
        }

        function saveModalPrediction() {
            const h = document.getElementById('modal-pred-h').value;
            const a = document.getElementById('modal-pred-a').value;
            
            const powerup = document.querySelector('input[name="powerup"]:checked')?.value || 'none';
            const isCap = powerup === 'captain';
            const isTC = powerup === 'triple';
            const isShield = powerup === 'shield';

            if (h === '' || a === '') return;
            if (!predictions[currentUser.username]) predictions[currentUser.username] = {};
            
            // إزالة الكابتن من مباريات نفس الجولة إذا تم اختياره هنا (العادي فقط)
            if (isCap) {
                const currentGw = activeMatchModal.gw;
                const gwMatchesIds = matches.filter(m => m.gw === currentGw).map(m => m.id);
                gwMatchesIds.forEach(matchId => {
                    if (predictions[currentUser.username][matchId]) {
                        predictions[currentUser.username][matchId].isCaptain = false;
                    }
                });
            }

            predictions[currentUser.username][activeMatchModal.id] = { 
                home: Number(h), 
                away: Number(a),
                isCaptain: isCap,
                isTripleCaptain: isTC,
                isShield: isShield
            };
            
            saveState();
            closeModal();
            render();
        }

        function setAuthMode(mode) {
            authMode = mode;
            render();
        }

        function handleAuth(e) {
            e.preventDefault();
            const name = document.getElementById('auth-name').value.trim();
            const pin = document.getElementById('auth-pin').value.trim();
            if (!name || pin.length < 4) {
                showCustomDialog('يرجى إدخال اسم المستخدم وكلمة مرور لا تقل عن 4 أرقام.');
                return;
            }

            if (authMode === 'register') {
                if (users.some(u => u.username.toLowerCase() === name.toLowerCase())) {
                    showCustomDialog('اسم المستخدم مستخدم مسبقاً، اختر اسمًا آخر.');
                    return;
                }
                const newUser = { username: name, pin: pin };
                users.push(newUser);
                currentUser = newUser;
            } else {
                const found = users.find(u => u.username.toLowerCase() === name.toLowerCase() && u.pin === pin);
                if (found) {
                    currentUser = found;
                } else {
                    showCustomDialog('بيانات الدخول غير صحيحة.');
                    return;
                }
            }
            saveState();
            render();
        }

        function logout() {
            currentUser = null;
            saveState();
            render();
        }

        function switchTab(tab) {
            currentTab = tab;
            render();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function createMiniLeague() {
            const name = document.getElementById('new-ml-name').value.trim();
            if (!name) return;
            const code = Math.random().toString(36).substring(2, 8).toUpperCase();
            miniLeagues.push({ id: 'ml_' + Date.now(), name, code, creator: currentUser.username, members: [currentUser.username] });
            saveState();
            showCustomDialog('تم إنشاء الدوري بنجاح! كود الدوري: ' + code);
            render();
        }

        function joinMiniLeague() {
            const code = document.getElementById('join-ml-code').value.trim().toUpperCase();
            const ml = miniLeagues.find(l => l.code === code);
            if (!ml) {
                showCustomDialog('كود الدوري غير صحيح!');
                return;
            }
            if (ml.members.includes(currentUser.username)) {
                showCustomDialog('أنت مشترك بالفعل في هذا الدوري!');
                return;
            }
            ml.members.push(currentUser.username);
            saveState();
            showCustomDialog('تم الانضمام للدوري بنجاح!');
            render();
        }

        function addMatch(e) {
            e.preventDefault();
            const gw = Number(document.getElementById('adm-gw').value);
            const home = document.getElementById('adm-home').value;
            const away = document.getElementById('adm-away').value;
            const date = document.getElementById('adm-date').value;
            const time = document.getElementById('adm-time').value;
            matches.push({ id: 'm_custom_' + Date.now(), gw, home, away, date, time, actualH: null, actualA: null });
            saveState();
            showCustomDialog('تمت إضافة المباراة بنجاح!');
            render();
        }

        function saveActual(id) {
            const hVal = document.getElementById(`actual-h-${id}`).value;
            const aVal = document.getElementById(`actual-a-${id}`).value;
            
            if (hVal === '' || aVal === '') {
                showCustomDialog('يرجى إدخال أهداف كلا الفريقين لتثبيت النتيجة.');
                return;
            }

            const m = matches.find(item => item.id === id);
            if (m) {
                m.actualH = parseInt(hVal, 10);
                m.actualA = parseInt(aVal, 10);
                saveState();
                showCustomDialog('تم تثبيت النتيجة رسمياً بنجاح!', 'alert');
                render();
            }
        }

        function clearActual(id) {
            const m = matches.find(item => item.id === id);
            if (m) {
                m.actualH = null;
                m.actualA = null;
                saveState();
                render();
            }
        }

        function adminDeleteLeague(leagueId) {
            showCustomDialog('هل أنت متأكد من حذف هذا الدوري نهائياً وكل مشتركيه؟', 'confirm', () => {
                miniLeagues = miniLeagues.filter(l => l.id !== leagueId);
                saveState();
                render();
            });
        }

        function adminKickMember(leagueId, memberName) {
            showCustomDialog(`هل أنت متأكد من طرد "${memberName}" من الدوري؟`, 'confirm', () => {
                const ml = miniLeagues.find(l => l.id === leagueId);
                if (ml) {
                    ml.members = ml.members.filter(m => m !== memberName);
                    saveState();
                    render();
                }
            });
        }

        function deleteMatch(id) {
            showCustomDialog('هل أنت متأكد من حذف هذه المباراة؟', 'confirm', () => {
                matches = matches.filter(m => m.id !== id);
                saveState();
                render();
            });
        }

        function showCustomDialog(message, type = 'alert', onConfirm = null) {
            const container = document.getElementById('dialog-container');
            container.innerHTML = `
                <div class="fixed inset-0 z-[70] bg-black/80 backdrop-blur-md flex items-center justify-center p-4">
                    <div class="glass max-w-xs w-full p-6 rounded-3xl shadow-2xl border border-white/10 text-center animate-fade-up">
                        <div class="text-4xl mb-4 text-amber-400">
                            <i class="fa-solid fa-${type === 'alert' ? 'circle-exclamation' : 'circle-question'}"></i>
                        </div>
                        <h3 class="text-sm font-bold text-white mb-6 leading-relaxed">${message}</h3>
                        <div class="flex gap-3">
                            ${type === 'confirm' ? `<button id="diag-yes" class="flex-1 py-2.5 bg-rose-600 hover:bg-rose-500 text-white font-bold text-xs rounded-xl transition-all">نعم، متأكد</button>` : ''}
                            <button id="diag-close" class="flex-1 py-2.5 bg-slate-800 hover:bg-slate-700 text-white font-bold text-xs rounded-xl transition-all">حسناً</button>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('diag-close').onclick = () => { container.innerHTML = ''; };
            if (type === 'confirm' && onConfirm) {
                document.getElementById('diag-yes').onclick = () => { container.innerHTML = ''; onConfirm(); };
            }
        }

        function renderAuthScreen() {
            return `
                <div class="min-h-screen flex items-center justify-center p-4 w-full">
                    <div class="glass max-w-md w-full p-6 md:p-8 rounded-3xl shadow-2xl border border-white/10 animate-fade-up">
                        <div class="text-center mb-6">
                            <div class="w-16 h-16 bg-blue-600/20 text-blue-400 rounded-2xl mx-auto flex items-center justify-center text-3xl font-black mb-3 border border-blue-500/30">
                                <i class="fa-solid fa-crown text-amber-400"></i>
                            </div>
                            <h1 class="text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-400 via-indigo-300 to-amber-400">
                                عرّاف الدوري الإنجليزي
                            </h1>
                            <p class="text-slate-400 text-xs mt-1">سجل دخولك أو أنشئ حساباً جديداً للبدء</p>
                        </div>

                        <div class="flex bg-slate-900/80 p-1 rounded-xl mb-6 border border-white/5">
                            <button onclick="setAuthMode('login')" class="flex-1 py-2 text-xs font-bold rounded-lg transition-all ${authMode === 'login' ? 'bg-blue-600 text-white shadow-md' : 'text-slate-400 hover:text-white'}">تسجيل الدخول</button>
                            <button onclick="setAuthMode('register')" class="flex-1 py-2 text-xs font-bold rounded-lg transition-all ${authMode === 'register' ? 'bg-blue-600 text-white shadow-md' : 'text-slate-400 hover:text-white'}">حساب جديد</button>
                        </div>

                        <form onsubmit="handleAuth(event)" class="space-y-4">
                            <div>
                                <label class="block text-xs font-bold text-slate-300 mb-1.5">اسم المستخدم (مثل: Red Army)</label>
                                <div class="relative">
                                    <span class="absolute right-3.5 top-3.5 text-slate-500"><i class="fa-solid fa-user"></i></span>
                                    <input type="text" id="auth-name" placeholder="أدخل اسم المستخدم" class="w-full bg-slate-900 border border-white/10 rounded-xl pr-10 pl-4 py-3 text-sm text-white focus:border-blue-500 outline-none" required />
                                </div>
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-slate-300 mb-1.5">كلمة المرور (4 أرقام أو أحرف على الأقل)</label>
                                <div class="relative">
                                    <span class="absolute right-3.5 top-3.5 text-slate-500"><i class="fa-solid fa-key"></i></span>
                                    <input type="password" id="auth-pin" placeholder="أدخل كلمة المرور" class="w-full bg-slate-900 border border-white/10 rounded-xl pr-10 pl-4 py-3 text-sm text-white focus:border-blue-500 outline-none" required />
                                </div>
                            </div>
                            <button type="submit" class="w-full py-3.5 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-bold rounded-xl shadow-lg shadow-blue-600/30 transition-all text-sm mt-2">
                                ${authMode === 'register' ? 'إنشاء الحساب والانطلاق' : 'دخول المنصة'}
                            </button>
                        </form>
                    </div>
                </div>
            `;
        }

        function render() {
            const app = document.getElementById('app');
            if (!currentUser) {
                app.innerHTML = renderAuthScreen();
                return;
            }

            app.innerHTML = `
                <header class="p-4 glass sticky top-0 z-40 border-b border-white/10 flex justify-between items-center shadow-lg">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-xl bg-blue-600/20 border border-blue-500/30 flex items-center justify-center font-black text-blue-400">
                            ${currentUser.username.substring(0, 2).toUpperCase()}
                        </div>
                        <div>
                            <h1 class="text-sm font-bold text-slate-200">مرحباً، ${currentUser.username}</h1>
                            <p class="text-[10px] text-slate-400">الموسم الرسمي 2026/2027</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-2">
                        ${currentUser.username.toLowerCase() === 'red army' ? `
                            <button onclick="switchTab('admin')" class="px-3 py-1.5 bg-rose-600/20 border border-rose-500/30 rounded-xl text-rose-300 text-xs font-bold hover:bg-rose-600/30 transition-all flex items-center gap-1.5">
                                <i class="fa-solid fa-shield-halved"></i> للإدارة

                        ` : ''}
                        <button onclick="logout()" class="p-2 glass text-rose-400 rounded-xl hover:bg-rose-950/40 transition-all text-xs" title="تسجيل الخروج">

                        </button>

                </header>

                <main class="flex-1 max-w-4xl w-full mx-auto p-4 animate-fade-up">
                    ${currentTab === 'home' ? renderHomeTab() : ''}
                    ${currentTab === 'matches' ? renderMatchesTab() : ''}
                    ${currentTab === 'standings' ? renderStandingsTab() : ''}
                    ${currentTab === 'minileagues' ? renderMiniLeaguesTab() : ''}
                    ${currentTab === 'rules' ? renderRulesTab() : ''}
                    ${currentTab === 'admin' && currentUser.username.toLowerCase() === 'red army' ? renderAdminTab() : ''}
                </main>

                <nav class="fixed bottom-0 left-0 right-0 glass border-t border-white/10 p-2 md:p-3 flex justify-around items-center z-40 bg-[#0a0e17]/95 backdrop-blur-xl">
                    <button onclick="switchTab('home')" class="flex flex-col items-center gap-1 transition-all ${currentTab === 'home' ? 'text-blue-400 scale-105' : 'text-slate-400 hover:text-white'}">
                        <i class="fa-solid fa-house text-base"></i><span class="text-[10px] font-bold">الرئيسية</span>
                    </button>
                    <button onclick="switchTab('matches')" class="flex flex-col items-center gap-1 transition-all ${currentTab === 'matches' ? 'text-blue-400 scale-105' : 'text-slate-400 hover:text-white'}">
                        <i class="fa-solid fa-futbol text-base"></i><span class="text-[10px] font-bold">المباريات</span>
